name: build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsndfile1

      - name: Install build dependencies
        run: |
          pip install --upgrade "setuptools<70" wheel "pkg_resources" 2>/dev/null || pip install --upgrade "setuptools<70" wheel

      - name: Install dependencies
        run: |
          # Install crepe first with no build isolation to avoid pkg_resources issue
          pip install --no-build-isolation "crepe>=0.0.16"
          # Then install the rest
          pip install -e ".[data_preparation,test]"

      - name: Check formatting
        run: ruff format --check ddsp

      - name: Lint with ruff
        run: ruff check ddsp

      - name: Test with pytest
        run: pytest --tb=short
        env:
          PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python

      - name: Report success or failure as github status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}'.toLowerCase();
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: status,
              target_url: `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              context: 'github-actions/build',
              description: status === 'success' ? 'All checks passed' : 'Checks failed'
            });
