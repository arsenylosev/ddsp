name: build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsndfile1

      - name: Create venv and install dependencies
        run: |
          uv venv --python 3.11
          # Install compatible TF versions FIRST (Python 3.11 only)
          uv pip install --python 3.11 "tensorflow>=2.12.0,<2.16.0" "tensorflow-probability>=0.20.0,<0.21.0"
          # Install ddsp without deps
          uv pip install --python 3.11 -e "." --no-deps
          # Install remaining deps
          uv pip install --python 3.11 protobuf librosa pydub mir_eval note_seq numpy scipy gin-config apache-beam absl-py cloudml-hypertune dill future google-cloud-storage six tensorflowjs matplotlib
          # Install test tools
          uv pip install --python 3.11 pytest ruff

      - name: Format code
        run: uv run --python 3.11 ruff format ddsp
        continue-on-error: true

      - name: Check formatting
        run: uv run --python 3.11 ruff format --check ddsp
        continue-on-error: true

      - name: Lint with ruff
        run: uv run --python 3.11 ruff check ddsp
        continue-on-error: true

      - name: Test with pytest
        run: uv run --python 3.11 pytest --tb=short
        env:
          PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python

      - name: Report success or failure as github status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}'.toLowerCase();
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: status,
              target_url: `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              context: 'github-actions/build',
              description: status === 'success' ? 'All checks passed' : 'Checks failed'
            });
