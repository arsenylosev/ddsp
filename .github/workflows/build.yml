name: build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-22.04  # Pin to Ubuntu 22.04 for consistent Python 3.11 support

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsndfile1

      - name: Install build dependencies
        run: |
          pip install --upgrade pip setuptools wheel hatchling

      - name: Verify Python version
        run: |
          python --version
          pip --version

      - name: Install Python dependencies
        run: |
          # Install TensorFlow and TFP first (pinned compatible versions)
          pip install "tensorflow==2.12.1" "tensorflow-probability==0.20.1" "protobuf>=3.20.3,<4.0"
          # Install the package without deps first, then remaining deps
          pip install -e "." --no-deps
          pip install librosa pydub mir_eval note_seq "numpy>=1.22,<1.24" scipy gin-config apache-beam absl-py cloudml-hypertune dill future google-cloud-storage six tensorflowjs matplotlib
          pip install pytest ruff
        env:
          PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python

      - name: Verify TensorFlow installation
        run: |
          python -c "import tensorflow as tf; print(f'TensorFlow version: {tf.__version__}')"
          python -c "import tensorflow_probability as tfp; print(f'TFP version: {tfp.__version__}')"

      - name: Run tests
        run: pytest ddsp/ -v --tb=short
        env:
          PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python

      - name: Report status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}'.toLowerCase();
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: status,
              target_url: `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              context: 'github-actions/build',
              description: status === 'success' ? 'All checks passed' : 'Tests failed'
            });
