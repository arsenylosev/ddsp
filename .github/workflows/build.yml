name: build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-22.04  # Pin to Ubuntu 22.04 for consistent Python 3.11 support

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsndfile1

      - name: Install build dependencies
        run: |
          pip install --upgrade pip setuptools wheel hatchling

      - name: Verify Python version
        run: |
          python --version
          pip --version

      - name: Install core dependencies
        run: |
          # Install TensorFlow and TFP FIRST (must be before any package that could upgrade them)
          pip install "tensorflow==2.12.1" "tensorflow-probability==0.20.1" "protobuf>=3.20.3,<4.0" "tensorflow-metadata<1.15"
          # Ensure setuptools is available for pkg_resources (needed by apache-beam)
          pip install "setuptools<70"
        env:
          PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python

      - name: Install package and remaining dependencies
        run: |
          # Install DDSP without deps first
          pip install -e "." --no-deps
          # Install remaining dependencies (avoiding packages that upgrade TF)
          # Install crepe first with no build isolation to avoid pkg_resources issue
          pip install "setuptools<70" "wheel"
          pip install librosa pydub "mir_eval<=0.7" "note_seq<0.0.4" "numpy>=1.22,<1.24" "scipy>=1.10.1,<1.12" gin-config apache-beam absl-py "cloudml-hypertune<=0.1.0.dev6" "dill<=0.3.4" future google-cloud-storage six "tensorflowjs<3.19" matplotlib "ipython<8.18.0" "tensorflow-datasets>=4.9,<5.0"
          pip install crepe --no-build-isolation
          pip install pytest ruff
        env:
          PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python

      - name: Verify TensorFlow installation
        run: |
          python -c "import tensorflow as tf; print(f'TensorFlow version: {tf.__version__}')"
          python -c "import tensorflow_probability as tfp; print(f'TFP version: {tfp.__version__}')"

      - name: Run tests
        run: pytest ddsp/ -v --tb=short
        env:
          PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python

      - name: Report status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}'.toLowerCase();
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: status,
              target_url: `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              context: 'github-actions/build',
              description: status === 'success' ? 'All checks passed' : 'Tests failed'
            });
