name: build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsndfile1

      - name: Install build dependencies
        run: |
          pip install -U pip setuptools wheel
          # Install all build dependencies for packages that need compilation
          pip install "setuptools<70" "pybind11" "numpy<1.24" "Cython"

      - name: Install package
        run: |
          # Install with no build isolation (uses system build deps)
          pip install -e ".[data_preparation,test]" --no-build-isolation

      - name: Format code
        run: ruff format ddsp

      - name: Check formatting
        run: ruff format --check ddsp

      - name: Lint with ruff
        run: ruff check ddsp

      - name: Test with pytest
        run: pytest --tb=short
        env:
          PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: python

      - name: Report success or failure as github status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}'.toLowerCase();
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: status,
              target_url: `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              context: 'github-actions/build',
              description: status === 'success' ? 'All checks passed' : 'Checks failed'
            });
